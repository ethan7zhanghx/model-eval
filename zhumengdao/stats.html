<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筑梦岛 · 数据面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <style>
    html, body { overflow: auto; height: auto; }
    .stats-shell { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 16px; }

    .stats-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(255,255,255,.9); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); flex-wrap: wrap; gap: 10px; }
    .stats-header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .stats-header .sub { font-size: .82rem; color: var(--text-soft); }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .kpi-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 3px; }
    .kpi-label { font-size: .72rem; color: var(--text-soft); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .kpi-value { font-size: 1.7rem; font-weight: 700; line-height: 1.1; }
    .kpi-sub { font-size: .75rem; color: var(--text-soft); }
    .kpi-ok .kpi-value { color: var(--ok); }

    /* Ranking */
    .ranking-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); padding: 16px 18px; box-shadow: var(--shadow-sm); }
    .ranking-card h2 { margin: 0 0 14px; font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; }
    .rank-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .rank-row:last-child { margin-bottom: 0; }
    .rank-num { font-size: .85rem; font-weight: 700; color: var(--text-soft); width: 24px; text-align: center; flex-shrink: 0; }
    .rank-num.gold { color: #b45309; }
    .rank-num.silver { color: #64748b; }
    .rank-num.bronze { color: #92400e; }
    .rank-model { font-size: .82rem; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-bar-track { width: 140px; height: 16px; background: var(--bg); border-radius: 999px; overflow: hidden; flex-shrink: 0; }
    .rank-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width .4s ease; }
    .rank-score { font-size: .78rem; color: var(--text-soft); white-space: nowrap; min-width: 100px; text-align: right; flex-shrink: 0; }

    /* Matrix */
    .matrix-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
    .matrix-card h2 { margin: 0; font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; padding: 14px 18px 12px; border-bottom: 1px solid var(--line); }
    .matrix-scroll { overflow-x: auto; padding: 14px 18px; }
    .matrix-table { border-collapse: collapse; font-size: .78rem; }
    .matrix-table th, .matrix-table td { padding: 7px 10px; text-align: center; white-space: nowrap; }
    .matrix-table th { font-weight: 600; color: var(--text-soft); background: #f7f9fd; }
    .matrix-table th.row-header { text-align: left; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .matrix-table td { border: 1px solid var(--line); min-width: 80px; }
    .matrix-table td.diag { background: #f1f5f9; color: var(--text-soft); }
    .matrix-cell-win { font-weight: 700; color: var(--ok); }
    .matrix-cell-lose { color: var(--err); }
    .matrix-cell-even { color: var(--text-soft); }
    .matrix-note { font-size: .75rem; color: var(--text-soft); padding: 0 18px 12px; }

    .section-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
    .section-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--line); flex-wrap: wrap; gap: 8px; }
    .section-head h2 { margin: 0; font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-select { font: inherit; font-size: .82rem; padding: 5px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: #fff; color: var(--text); cursor: pointer; }

    .sessions-list { display: flex; flex-direction: column; }
    .session-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s; }
    .session-row:last-child { border-bottom: none; }
    .session-row:hover { background: #f7f9fd; }
    .session-row-main { flex: 1; min-width: 0; }
    .session-row-title { font-size: .88rem; font-weight: 600; margin-bottom: 3px; }
    .session-row-meta { font-size: .75rem; color: var(--text-soft); display: flex; gap: 10px; flex-wrap: wrap; }
    .session-row-preview { font-size: .78rem; color: var(--text-soft); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }

    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
    .badge-model { background: var(--accent-light); color: var(--accent); }
    .badge-skip { background: #f1f5f9; color: #64748b; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-soft); font-size: .88rem; }

    /* Dialog */
    .dialog-overlay { position: fixed; inset: 0; background: rgba(10,20,40,.45); backdrop-filter: blur(4px); z-index: 60; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .dialog-overlay.hidden { display: none !important; }
    .dialog-inner { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: min(900px, 100%); max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
    .dialog-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 16px 20px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .dialog-header h3 { margin: 0 0 4px; font-size: 1rem; }
    .dialog-meta { margin: 0; font-size: .78rem; color: var(--text-soft); }
    .dialog-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .dialog-body::-webkit-scrollbar { width: 5px; }
    .dialog-body::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 99px; }

    .turn-block { display: flex; flex-direction: column; gap: 8px; }
    .turn-compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .turn-response { border: 1px solid var(--line); border-radius: var(--radius-md); background: #fff; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
    .turn-response.chosen { border-color: var(--accent); background: var(--accent-light); }
    .turn-response.errored { border-color: color-mix(in srgb, var(--err) 30%, var(--line)); background: #fff8f8; }
    .turn-response-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .turn-model-name { font-size: .75rem; color: var(--text-soft); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .turn-latency { font-size: .72rem; color: var(--text-soft); }
    .chosen-badge { font-size: .72rem; font-weight: 700; color: var(--accent); background: var(--accent-light); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 999px; padding: 1px 8px; }
    .turn-response-body { font-size: .85rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: var(--text); max-height: 240px; overflow-y: auto; }
    .turn-response-body::-webkit-scrollbar { width: 3px; }
    .turn-response-body::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 99px; }
    .turn-skip-note { margin: 0; font-size: .78rem; color: var(--warn); padding: 4px 8px; background: #fffbeb; border-radius: var(--radius-sm); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }

    .dialog-body .msg { max-width: min(80%, 640px); }

    @media (max-width: 700px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .turn-compare-grid { grid-template-columns: 1fr; }
      .model-name { min-width: 100px; max-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="stats-shell">
    <header class="stats-header">
      <div class="header-brand">
        <span class="brand-icon">⛵</span>
        <div>
          <h1>筑梦岛 · 数据面板</h1>
          <span class="sub" id="lastUpdated">加载中...</span>
        </div>
      </div>
      <div class="header-actions">
        <a href="./" style="text-decoration:none;font-size:.85rem;padding:7px 14px;border:1px solid var(--line);border-radius:999px;color:var(--text-soft);background:transparent">← 返回对话</a>
        <button id="refreshBtn" class="ghost-btn">刷新</button>
        <button id="exportBtn" class="ghost-btn">导出 JSON</button>
      </div>
    </header>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">总轮次</div><div class="kpi-value" id="kpiTotal">—</div></div>
      <div class="kpi-card kpi-ok"><div class="kpi-label">已评</div><div class="kpi-value" id="kpiVotes">—</div></div>
      <div class="kpi-card"><div class="kpi-label">跳过</div><div class="kpi-value" id="kpiSkip">—</div></div>
      <div class="kpi-card"><div class="kpi-label">对话数</div><div class="kpi-value" id="kpiSessions">—</div></div>
    </div>

    <div class="ranking-card">
      <h2>模型排名</h2>
      <div id="rankingBody"><p class="empty-state" style="padding:8px 0">暂无数据</p></div>
    </div>

    <div class="matrix-card">
      <h2>对战矩阵（行 vs 列）</h2>
      <div class="matrix-scroll" id="matrixBody"><p class="empty-state">暂无数据</p></div>
      <p class="matrix-note">格子显示：行模型 vs 列模型 的胜场/总场次（胜率%）。相同模型对战不计入。</p>
    </div>

    <div class="section-card">
      <div class="section-head">
        <h2>对话记录</h2>
        <div class="toolbar">
          <select class="filter-select" id="filterRole">
            <option value="">全部角色</option>
          </select>
        </div>
      </div>
      <div class="sessions-list" id="sessionsList">
        <p class="empty-state">加载中...</p>
      </div>
    </div>
  </div>

  <!-- 对话详情弹窗 -->
  <div class="dialog-overlay hidden" id="dialogOverlay">
    <div class="dialog-inner">
      <div class="dialog-header">
        <div>
          <h3 id="dialogTitle">对话详情</h3>
          <p class="dialog-meta" id="dialogMeta"></p>
        </div>
        <button class="close-btn" id="dialogClose" aria-label="关闭">✕</button>
      </div>
      <div class="dialog-body" id="dialogBody"></div>
    </div>
  </div>

  <script>
    const RECORDS_API = "/api/zhumengdao-records";
    const SESSIONS_API = "/api/zhumengdao-sessions";

    let allRecords = [];
    let allSessions = [];

    function esc(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function shortText(text, max = 80) {
      const s = String(text || "");
      return s.length > max ? s.slice(0, max - 1) + "…" : s;
    }
    function formatDate(ts) {
      if (!ts) return "—";
      return new Date(ts).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false });
    }

    // ── 统计：对战矩阵 + Bradley-Terry 排名 ──────────────
    function buildMatchStats(records) {
      // wins[i][j] = model i 在对阵 model j 时赢的次数
      // games[i][j] = model i 对阵 model j 的总场次
      const wins = {};   // wins[modelA][modelB]
      const games = {};  // games[modelA][modelB]
      let voteCount = 0, discardCount = 0;
      const sessions = new Set();
      const modelSet = new Set();

      function ensure(a, b) {
        if (!wins[a]) wins[a] = {};
        if (!wins[b]) wins[b] = {};
        if (!games[a]) games[a] = {};
        if (!games[b]) games[b] = {};
        if (wins[a][b] == null) wins[a][b] = 0;
        if (wins[b][a] == null) wins[b][a] = 0;
        if (games[a][b] == null) games[a][b] = 0;
        if (games[b][a] == null) games[b][a] = 0;
      }

      for (const r of records) {
        if (r.sessionId) sessions.add(r.sessionId);
        if (r.action === "discard") { discardCount++; continue; }
        if (r.action !== "vote") continue;
        voteCount++;

        const mA = r.apiA?.model;
        const mB = r.apiB?.model;
        if (!mA || !mB) continue;

        // 相同模型不计入矩阵
        if (mA === mB) continue;

        modelSet.add(mA);
        modelSet.add(mB);
        ensure(mA, mB);

        games[mA][mB] += 1;
        games[mB][mA] += 1;

        const winner = r.selectedModel ||
          (r.selected === "a" ? mA : r.selected === "b" ? mB : null);
        if (winner === mA) wins[mA][mB] += 1;
        else if (winner === mB) wins[mB][mA] += 1;
      }

      const models = [...modelSet].sort();
      return { wins, games, models, voteCount, discardCount, sessions: sessions.size, total: records.length };
    }

    // Bradley-Terry 迭代求解
    function bradleyTerry(models, wins, games, maxIter = 200, tol = 1e-6) {
      if (!models.length) return {};
      const score = {};
      for (const m of models) score[m] = 1.0;

      for (let iter = 0; iter < maxIter; iter++) {
        const newScore = {};
        let maxDelta = 0;
        for (const i of models) {
          let num = 0, den = 0;
          for (const j of models) {
            if (i === j) continue;
            const g = (games[i]?.[j] || 0);
            if (!g) continue;
            num += (wins[i]?.[j] || 0);
            den += g / (score[i] + score[j]);
          }
          newScore[i] = den > 0 ? num / den : score[i];
        }
        // Normalize so sum = models.length
        const total = Object.values(newScore).reduce((s, v) => s + v, 0);
        for (const m of models) {
          newScore[m] = total > 0 ? newScore[m] / total * models.length : 1;
          maxDelta = Math.max(maxDelta, Math.abs(newScore[m] - score[m]));
          score[m] = newScore[m];
        }
        if (maxDelta < tol) break;
      }
      return score;
    }

    function renderRanking(stats) {
      const el = document.getElementById("rankingBody");
      if (!stats.models.length) {
        el.innerHTML = `<p class="empty-state" style="padding:8px 0">暂无跨模型对战数据</p>`;
        return;
      }
      const scores = bradleyTerry(stats.models, stats.wins, stats.games);
      const ranked = [...stats.models].sort((a, b) => scores[b] - scores[a]);
      const maxScore = Math.max(...Object.values(scores), 1);
      const medals = ["gold", "silver", "bronze"];

      el.innerHTML = ranked.map((m, i) => {
        const s = scores[m];
        const totalWins = stats.models.reduce((acc, j) => acc + (j !== m ? (stats.wins[m]?.[j] || 0) : 0), 0);
        const totalGames = stats.models.reduce((acc, j) => acc + (j !== m ? (stats.games[m]?.[j] || 0) : 0), 0);
        const wr = totalGames ? Math.round(totalWins / totalGames * 100) : 0;
        return `
          <div class="rank-row">
            <div class="rank-num ${medals[i] || ""}">${i + 1}</div>
            <div class="rank-model" title="${esc(m)}">${esc(m)}</div>
            <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${Math.round(s / maxScore * 100)}%"></div></div>
            <div class="rank-score">${totalWins}胜/${totalGames}场 · ${wr}%</div>
          </div>`;
      }).join("");
    }

    function renderMatrix(stats) {
      const el = document.getElementById("matrixBody");
      if (!stats.models.length) {
        el.innerHTML = `<p class="empty-state">暂无跨模型对战数据</p>`;
        return;
      }
      const { models, wins, games } = stats;
      const scores = bradleyTerry(models, wins, games);
      const ranked = [...models].sort((a, b) => scores[b] - scores[a]);

      let html = `<table class="matrix-table"><thead><tr><th class="row-header">行 \\ 列</th>`;
      for (const col of ranked) html += `<th title="${esc(col)}">${esc(shortText(col, 20))}</th>`;
      html += `</tr></thead><tbody>`;

      for (const row of ranked) {
        html += `<tr><th class="row-header" title="${esc(row)}">${esc(shortText(row, 24))}</th>`;
        for (const col of ranked) {
          if (row === col) {
            html += `<td class="diag">—</td>`;
          } else {
            const w = wins[row]?.[col] || 0;
            const g = games[row]?.[col] || 0;
            if (!g) {
              html += `<td class="matrix-cell-even" style="color:#cbd5e1">—</td>`;
            } else {
              const pct = Math.round(w / g * 100);
              const cls = pct > 50 ? "matrix-cell-win" : pct < 50 ? "matrix-cell-lose" : "matrix-cell-even";
              html += `<td class="${cls}">${w}/${g}<br><span style="font-size:.7rem">${pct}%</span></td>`;
            }
          }
        }
        html += `</tr>`;
      }
      html += `</tbody></table>`;
      el.innerHTML = html;
    }

    function renderKpi(stats) {
      document.getElementById("kpiTotal").textContent = stats.voteCount + stats.discardCount;
      document.getElementById("kpiVotes").textContent = stats.voteCount;
      document.getElementById("kpiSkip").textContent = stats.discardCount;
      document.getElementById("kpiSessions").textContent = stats.sessions;
    }

    // ── 对话列表 ──────────────────────────────────────────
    function buildSessionSummaries() {
      // Group records by sessionId
      const bySession = new Map();
      for (const r of allRecords) {
        if (!r.sessionId) continue;
        if (!bySession.has(r.sessionId)) bySession.set(r.sessionId, []);
        bySession.get(r.sessionId).push(r);
      }

      return allSessions.map(s => {
        const recs = (bySession.get(s.id) || []).sort((a, b) => a.turnOrder - b.turnOrder);
        const firstUser = recs[0]?.userText || "";
        const voteRecs = recs.filter(r => r.action === "vote");
        const models = [...new Set([
          ...recs.map(r => r.apiA?.model).filter(Boolean),
          ...recs.map(r => r.apiB?.model).filter(Boolean),
        ])];
        return { session: s, recs, firstUser, voteRecs, models };
      }).filter(x => x.recs.length > 0 || x.session.turnCount > 0);
    }

    function renderSessionsList(summaries) {
      const el = document.getElementById("sessionsList");
      if (!summaries.length) {
        el.innerHTML = `<p class="empty-state">暂无对话记录</p>`;
        return;
      }
      el.innerHTML = "";
      for (const { session, recs, firstUser, voteRecs, models } of summaries) {
        const row = document.createElement("div");
        row.className = "session-row";
        const winnerCounts = {};
        for (const r of voteRecs) {
          const w = r.selectedModel || (r.selected === "a" ? r.apiA?.model : r.apiB?.model) || "";
          if (w) winnerCounts[w] = (winnerCounts[w] || 0) + 1;
        }
        const winnerBadges = Object.entries(winnerCounts)
          .sort((a, b) => b[1] - a[1])
          .map(([m, n]) => `<span class="badge badge-model">${esc(m)} ×${n}</span>`)
          .join(" ");

        row.innerHTML = `
          <div class="session-row-main">
            <div class="session-row-title">${esc(session.roleName || "未知角色")}</div>
            <div class="session-row-meta">
              <span>${formatDate(session.createdAt)}</span>
              <span>${recs.length} 轮</span>
              <span>${models.map(m => esc(m)).join(" vs ")}</span>
            </div>
            <div class="session-row-preview">${esc(shortText(firstUser, 100))}</div>
          </div>
          <div class="session-row-right">
            ${winnerBadges || `<span class="badge badge-skip">无评测</span>`}
          </div>
        `;
        row.addEventListener("click", () => openDialog(session, recs));
        el.appendChild(row);
      }
    }

    function populateRoleFilter(summaries) {
      const roles = [...new Set(summaries.map(s => s.session.roleName).filter(Boolean))];
      const sel = document.getElementById("filterRole");
      sel.innerHTML = `<option value="">全部角色</option>` +
        roles.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("");
    }

    function applyFilters() {
      const role = document.getElementById("filterRole").value;
      const summaries = buildSessionSummaries();
      const filtered = role ? summaries.filter(s => s.session.roleName === role) : summaries;
      renderSessionsList(filtered);
    }

    // ── 对话详情弹窗 ──────────────────────────────────────
    function openDialog(session, recs) {
      document.getElementById("dialogTitle").textContent =
        `${session.roleName || "未知角色"} · ${formatDate(session.createdAt)}`;
      const models = [...new Set([
        ...recs.map(r => r.apiA?.model).filter(Boolean),
        ...recs.map(r => r.apiB?.model).filter(Boolean),
      ])];
      document.getElementById("dialogMeta").textContent =
        `${models.join(" vs ")}  ·  Temperature ${session.temperature ?? 0}  ·  共 ${recs.length} 轮`;

      const body = document.getElementById("dialogBody");
      body.innerHTML = "";

      for (const rec of recs.sort((a, b) => a.turnOrder - b.turnOrder)) {
        // User message
        const userEl = document.createElement("article");
        userEl.className = "msg user";
        userEl.innerHTML = `<div class="msg-meta"><span>用户</span></div><div class="msg-bubble">${esc(rec.userText)}</div>`;
        body.appendChild(userEl);

        // Compare block
        const block = document.createElement("div");
        block.className = "turn-block";

        const selectedModel = rec.selectedModel ||
          (rec.selected === "a" ? rec.apiA?.model : rec.selected === "b" ? rec.apiB?.model : null);

        const responses = [
          { data: rec.apiA, slot: "a" },
          { data: rec.apiB, slot: "b" },
        ];

        const grid = document.createElement("div");
        grid.className = "turn-compare-grid";

        for (const { data, slot } of responses) {
          if (!data) continue;
          const isChosen = rec.action === "vote" && rec.selected === slot;
          const div = document.createElement("div");
          div.className = `turn-response${isChosen ? " chosen" : ""}${!data.ok ? " errored" : ""}`;
          div.innerHTML = `
            <div class="turn-response-head">
              <span class="turn-model-name" title="${esc(data.model)}">${esc(data.model || "—")}</span>
              <span class="turn-latency">${data.latencyMs != null ? data.latencyMs + "ms" : ""}</span>
              ${isChosen ? `<span class="chosen-badge">✓ 已选</span>` : ""}
            </div>
            <div class="turn-response-body">${esc(data.content || "（无内容）")}</div>
          `;
          grid.appendChild(div);
        }
        block.appendChild(grid);

        if (rec.action === "discard") {
          const note = document.createElement("p");
          note.className = "turn-skip-note";
          note.textContent = "⚠ 本轮已跳过";
          block.appendChild(note);
        }
        body.appendChild(block);

        // Chosen reply in chat flow
        if (rec.action === "vote" && rec.selected) {
          const chosen = rec.selected === "a" ? rec.apiA : rec.apiB;
          const assistantEl = document.createElement("article");
          assistantEl.className = "msg assistant";
          assistantEl.innerHTML = `
            <div class="msg-meta">
              <span>助手</span>
              <span class="msg-source-badge badge-${rec.selected}">${esc(selectedModel || rec.selected.toUpperCase())}</span>
            </div>
            <div class="msg-bubble">${esc(chosen?.content || "")}</div>
          `;
          body.appendChild(assistantEl);
        }
      }

      document.getElementById("dialogOverlay").classList.remove("hidden");
    }

    // ── 加载 ──────────────────────────────────────────────
    async function load() {
      document.getElementById("lastUpdated").textContent = "加载中...";
      try {
        const [recRes, sesRes] = await Promise.all([
          fetch(`${RECORDS_API}?limit=2000`),
          fetch(`${SESSIONS_API}?limit=1000`),
        ]);
        const recData = await recRes.json();
        const sesData = await sesRes.json();

        allRecords = Array.isArray(recData.items) ? recData.items : [];
        allSessions = Array.isArray(sesData.sessions) ? sesData.sessions : [];

        // Sort sessions newest first
        allSessions.sort((a, b) => b.createdAt - a.createdAt);

        const stats = buildMatchStats(allRecords);
        renderKpi(stats);
        renderRanking(stats);
        renderMatrix(stats);

        const summaries = buildSessionSummaries();
        populateRoleFilter(summaries);
        renderSessionsList(summaries);

        document.getElementById("lastUpdated").textContent =
          `更新于 ${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;
      } catch (e) {
        document.getElementById("lastUpdated").textContent = "加载失败";
        document.getElementById("sessionsList").innerHTML =
          `<p class="empty-state" style="color:var(--err)">加载失败：${e.message}</p>`;
      }
    }

    async function exportRecords() {
      try {
        const res = await fetch(`${RECORDS_API}?limit=2000`);
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `zhumengdao-records-${Date.now()}.json`; a.click();
        URL.revokeObjectURL(url);
      } catch (e) { alert("导出失败：" + e.message); }
    }

    document.getElementById("refreshBtn").addEventListener("click", load);
    document.getElementById("exportBtn").addEventListener("click", exportRecords);
    document.getElementById("filterRole").addEventListener("change", applyFilters);
    document.getElementById("dialogClose").addEventListener("click", () => {
      document.getElementById("dialogOverlay").classList.add("hidden");
    });
    document.getElementById("dialogOverlay").addEventListener("click", e => {
      if (e.target === document.getElementById("dialogOverlay"))
        document.getElementById("dialogOverlay").classList.add("hidden");
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") document.getElementById("dialogOverlay").classList.add("hidden");
    });

    load();
  </script>
</body>
</html>
