<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筑梦岛 · 数据面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <style>
    html, body { overflow: auto; height: auto; }
    .stats-shell { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 16px; }

    .stats-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(255,255,255,.9); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); flex-wrap: wrap; gap: 10px; }
    .stats-header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
    .stats-header .sub { font-size: .82rem; color: var(--text-soft); }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .kpi-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 3px; }
    .kpi-label { font-size: .72rem; color: var(--text-soft); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .kpi-value { font-size: 1.7rem; font-weight: 700; line-height: 1.1; }
    .kpi-sub { font-size: .75rem; color: var(--text-soft); }
    .kpi-ok .kpi-value { color: var(--ok); }

    /* Ranking */
    .ranking-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); padding: 16px 18px; box-shadow: var(--shadow-sm); }
    .ranking-card h2 { margin: 0 0 14px; font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; }
    .rank-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .rank-row:last-child { margin-bottom: 0; }
    .rank-num { font-size: .85rem; font-weight: 700; color: var(--text-soft); width: 24px; text-align: center; flex-shrink: 0; }
    .rank-num.gold { color: #b45309; }
    .rank-num.silver { color: #64748b; }
    .rank-num.bronze { color: #92400e; }
    .rank-model { font-size: .82rem; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-bar-track { width: 140px; height: 16px; background: var(--bg); border-radius: 999px; overflow: hidden; flex-shrink: 0; }
    .rank-bar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width .4s ease; }
    .rank-score { font-size: .78rem; color: var(--text-soft); white-space: nowrap; min-width: 100px; text-align: right; flex-shrink: 0; }

    /* Matrix */
    .matrix-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
    .matrix-card h2 { margin: 0; font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; padding: 14px 18px 12px; border-bottom: 1px solid var(--line); }
    .matrix-scroll { overflow-x: auto; padding: 14px 18px; }
    .matrix-table { border-collapse: collapse; font-size: .78rem; }
    .matrix-table th, .matrix-table td { padding: 7px 10px; text-align: center; white-space: nowrap; }
    .matrix-table th { font-weight: 600; color: var(--text-soft); background: #f7f9fd; }
    .matrix-table th.row-header { text-align: left; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .matrix-table td { border: 1px solid var(--line); min-width: 80px; }
    .matrix-table td.diag { background: #f1f5f9; color: var(--text-soft); }
    .matrix-cell-win { font-weight: 700; color: var(--ok); }
    .matrix-cell-lose { color: var(--err); }
    .matrix-cell-even { color: var(--text-soft); }
    .matrix-note { font-size: .75rem; color: var(--text-soft); padding: 0 18px 12px; }

    .perf-wrap { overflow-x: auto; padding: 12px 16px 14px; }
    .perf-table { width: 100%; border-collapse: collapse; font-size: .78rem; min-width: 660px; }
    .perf-table th, .perf-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    .perf-table th { font-weight: 700; color: var(--text-soft); background: #f7f9fd; font-size: .74rem; text-transform: uppercase; letter-spacing: .04em; }
    .perf-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .perf-table tr:last-child td { border-bottom: none; }
    .perf-note { font-size: .75rem; color: var(--text-soft); padding: 0 16px 12px; }

    .section-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; }
    .section-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--line); flex-wrap: wrap; gap: 8px; }
    .section-head h2 { margin: 0; font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-select { font: inherit; font-size: .82rem; padding: 5px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: #fff; color: var(--text); cursor: pointer; }

    .sessions-list { display: flex; flex-direction: column; }
    .sessions-hint { padding: 10px 16px; border-bottom: 1px solid var(--line); font-size: .78rem; color: var(--text-soft); background: #fafcff; }
    .session-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s; }
    .session-row:last-child { border-bottom: none; }
    .session-row:hover { background: #f7f9fd; }
    .session-row-main { flex: 1; min-width: 0; }
    .session-row-title { font-size: .88rem; font-weight: 600; margin-bottom: 3px; }
    .session-row-meta { font-size: .75rem; color: var(--text-soft); display: flex; gap: 10px; flex-wrap: wrap; }
    .session-row-preview { font-size: .78rem; color: var(--text-soft); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .session-row-badges { display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }

    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: .72rem; font-weight: 700; }
    .badge-model { background: var(--accent-light); color: var(--accent); }
    .badge-skip { background: #f1f5f9; color: #64748b; }
    .badge-archived { background: #fff7ed; color: #c2410c; }
    .row-action-btn { font: inherit; font-size: .78rem; padding: 5px 10px; border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--line)); border-radius: 999px; background: #fff; color: var(--accent); cursor: pointer; transition: background .12s, border-color .12s, color .12s; }
    .row-action-btn:hover { background: var(--accent-light); }
    .row-action-btn.secondary { color: var(--text-soft); border-color: var(--line); }
    .row-action-btn.secondary:hover { background: #f7f9fd; }
    .row-action-btn:disabled { opacity: .6; cursor: wait; }

    .empty-state { text-align: center; padding: 40px; color: var(--text-soft); font-size: .88rem; }

    /* Dialog */
    .dialog-overlay { position: fixed; inset: 0; background: rgba(10,20,40,.45); backdrop-filter: blur(4px); z-index: 60; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .dialog-overlay.hidden { display: none !important; }
    .dialog-inner { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: min(900px, 100%); max-height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
    .dialog-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 16px 20px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .dialog-header h3 { margin: 0 0 4px; font-size: 1rem; }
    .dialog-meta { margin: 0; font-size: .78rem; color: var(--text-soft); }
    .dialog-actions { display: flex; align-items: center; gap: 8px; }
    .dialog-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .dialog-body::-webkit-scrollbar { width: 5px; }
    .dialog-body::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 99px; }

    .turn-block { display: flex; flex-direction: column; gap: 8px; }
    .turn-compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .turn-response { border: 1px solid var(--line); border-radius: var(--radius-md); background: #fff; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
    .turn-response.chosen { border-color: var(--accent); background: var(--accent-light); }
    .turn-response.errored { border-color: color-mix(in srgb, var(--err) 30%, var(--line)); background: #fff8f8; }
    .turn-response-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .turn-model-name { font-size: .75rem; color: var(--text-soft); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .turn-latency { font-size: .72rem; color: var(--text-soft); }
    .chosen-badge { font-size: .72rem; font-weight: 700; color: var(--accent); background: var(--accent-light); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 999px; padding: 1px 8px; }
    .turn-response-body { font-size: .85rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; color: var(--text); max-height: 240px; overflow-y: auto; }
    .turn-response-body::-webkit-scrollbar { width: 3px; }
    .turn-response-body::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 99px; }
    .turn-skip-note { margin: 0; font-size: .78rem; color: var(--warn); padding: 4px 8px; background: #fffbeb; border-radius: var(--radius-sm); border: 1px solid color-mix(in srgb, var(--warn) 25%, transparent); }

    .dialog-body .msg { max-width: min(80%, 640px); }

    /* Filter bar */
    .filter-bar { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-md); padding: 14px 18px; box-shadow: var(--shadow-sm); }
    .filter-bar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .filter-bar-title { font-size: .85rem; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .04em; }
    .filter-bar-actions { display: flex; gap: 8px; align-items: center; }
    .filter-bar-hint { font-size: .75rem; color: var(--accent); font-weight: 600; display: none; }
    .filter-bar-hint.active { display: inline; }
    .filter-controls { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .filter-item { display: flex; flex-direction: column; gap: 4px; font-size: .78rem; color: var(--text-soft); font-weight: 500; }
    .filter-item input, .filter-item select { font: inherit; font-size: .82rem; padding: 6px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: #fff; color: var(--text); outline: none; transition: border-color .15s; }
    .filter-item input:focus, .filter-item select:focus { border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); }
    .filter-item input[type="date"] { min-width: 145px; }
    .filter-item select { min-width: 140px; max-width: 220px; }
    .clear-filters-btn { font: inherit; font-size: .78rem; padding: 6px 14px; border: 1px solid var(--line); border-radius: 999px; background: transparent; color: var(--text-soft); cursor: pointer; transition: background .12s, color .12s; white-space: nowrap; }
    .clear-filters-btn:hover { background: #f7f9fd; color: var(--text); }

    @media (max-width: 700px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .turn-compare-grid { grid-template-columns: 1fr; }
      .model-name { min-width: 100px; max-width: 140px; }
      .filter-controls { gap: 8px; }
      .filter-item select, .filter-item input[type="date"] { min-width: 120px; }
    }
  </style>
</head>
<body>
  <div class="stats-shell">
    <header class="stats-header">
      <div class="header-brand">
        <span class="brand-icon">⛵</span>
        <div>
          <h1>筑梦岛 · 数据面板</h1>
          <span class="sub" id="lastUpdated">加载中...</span>
        </div>
      </div>
      <div class="header-actions">
        <a href="./" style="text-decoration:none;font-size:.85rem;padding:7px 14px;border:1px solid var(--line);border-radius:999px;color:var(--text-soft);background:transparent">← 返回对话</a>
        <button id="refreshBtn" class="ghost-btn">刷新</button>
        <button id="exportBtn" class="ghost-btn">导出 JSON</button>
      </div>
    </header>

    <div class="filter-bar">
      <div class="filter-bar-head">
        <span class="filter-bar-title">全局筛选</span>
        <div class="filter-bar-actions">
          <span class="filter-bar-hint" id="filterHint">筛选已生效</span>
          <button class="clear-filters-btn" id="clearFiltersBtn" type="button">清除筛选</button>
        </div>
      </div>
      <div class="filter-controls">
        <label class="filter-item">
          <span>开始日期</span>
          <input type="date" id="globalDateFrom">
        </label>
        <label class="filter-item">
          <span>结束日期</span>
          <input type="date" id="globalDateTo">
        </label>
        <label class="filter-item">
          <span>角色</span>
          <select id="globalRole"><option value="">全部角色</option></select>
        </label>
        <label class="filter-item">
          <span>模型 1</span>
          <select id="globalModel1"><option value="">全部模型</option></select>
        </label>
        <label class="filter-item">
          <span>模型 2</span>
          <select id="globalModel2"><option value="">全部模型</option></select>
        </label>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">总轮次</div><div class="kpi-value" id="kpiTotal">—</div></div>
      <div class="kpi-card kpi-ok"><div class="kpi-label">已评</div><div class="kpi-value" id="kpiVotes">—</div></div>
      <div class="kpi-card"><div class="kpi-label">跳过</div><div class="kpi-value" id="kpiSkip">—</div></div>
      <div class="kpi-card"><div class="kpi-label">对话数</div><div class="kpi-value" id="kpiSessions">—</div></div>
      <div class="kpi-card"><div class="kpi-label">平均 TTFT</div><div class="kpi-value" id="kpiAvgTtft">—</div><div class="kpi-sub">ms</div></div>
      <div class="kpi-card"><div class="kpi-label">平均 TPS</div><div class="kpi-value" id="kpiAvgTps">—</div><div class="kpi-sub">tokens/s</div></div>
    </div>

    <div class="ranking-card">
      <h2>模型排名</h2>
      <div id="rankingBody"><p class="empty-state" style="padding:8px 0">暂无数据</p></div>
    </div>

    <div class="matrix-card">
      <h2>对战矩阵（行 vs 列）</h2>
      <div class="matrix-scroll" id="matrixBody"><p class="empty-state">暂无数据</p></div>
      <p class="matrix-note">格子显示：行模型 vs 列模型 的胜场/总场次（胜率%）。相同模型对战不计入。</p>
    </div>

    <div class="section-card">
      <div class="section-head">
        <h2>速度统计（TTFT / TPS）</h2>
      </div>
      <div class="perf-wrap" id="perfTableBody"><p class="empty-state" style="padding:12px 0">暂无速度数据</p></div>
      <p class="perf-note">统计口径：仅包含调用成功（ok=true）的模型响应。TPS 由 tokens / (总耗时 - TTFT) 计算。</p>
    </div>

    <div class="section-card">
      <div class="section-head">
        <h2>对话记录</h2>
        <div class="toolbar">
          <select class="filter-select" id="filterArchive">
            <option value="active">未归档</option>
            <option value="all">全部</option>
            <option value="archived">仅已归档</option>
          </select>
        </div>
      </div>
      <!-- 密码锁 -->
      <div id="authWall" style="padding:32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px">
        <p style="margin:0;font-size:.88rem;color:var(--text-soft)">对话记录需要管理员密码</p>
        <div style="display:flex;gap:8px;max-width:320px;width:100%">
          <input id="adminPasswordInput" type="password" placeholder="输入密码" style="flex:1;font:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:var(--radius-sm);outline:none">
          <button id="adminLoginBtn" style="font:inherit;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:600">确认</button>
        </div>
        <p id="authError" style="margin:0;font-size:.8rem;color:var(--err);min-height:1em"></p>
      </div>
      <div class="sessions-hint" id="sessionsHint" style="display:none"></div>
      <div class="sessions-list" id="sessionsList" style="display:none"></div>
    </div>
  </div>

  <!-- 对话详情弹窗 -->
  <div class="dialog-overlay hidden" id="dialogOverlay">
    <div class="dialog-inner">
      <div class="dialog-header">
        <div>
          <h3 id="dialogTitle">对话详情</h3>
          <p class="dialog-meta" id="dialogMeta"></p>
        </div>
        <div class="dialog-actions">
          <button class="ghost-btn hidden" id="dialogArchiveBtn" type="button">归档</button>
          <button class="close-btn" id="dialogClose" aria-label="关闭">✕</button>
        </div>
      </div>
      <div class="dialog-body" id="dialogBody"></div>
    </div>
  </div>

  <script>
    const RECORDS_API = "/api/zhumengdao-records";
    const SESSIONS_API = "/api/zhumengdao-sessions";

    let allRecords = [];
    let allSessions = [];
    let currentDialogSessionId = "";
    let isArchiveSaving = false;

    // ── Global filter state ──────────────────────────────────
    let gFilterDateFrom = "";
    let gFilterDateTo = "";
    let gFilterRole = "";
    let gFilterModel1 = "";
    let gFilterModel2 = "";

    function getAllModels() {
      const models = new Set();
      for (const r of allRecords) {
        if (r.apiA?.model) models.add(r.apiA.model);
        if (r.apiB?.model) models.add(r.apiB.model);
      }
      return [...models].sort();
    }
    function getAllRoles() {
      return [...new Set(allSessions.map(s => s.roleName).filter(Boolean))].sort();
    }
    function readGlobalFilters() {
      gFilterDateFrom = document.getElementById("globalDateFrom").value || "";
      gFilterDateTo = document.getElementById("globalDateTo").value || "";
      gFilterRole = document.getElementById("globalRole").value || "";
      gFilterModel1 = document.getElementById("globalModel1").value || "";
      gFilterModel2 = document.getElementById("globalModel2").value || "";
    }
    function hasActiveFilters() {
      return !!(gFilterDateFrom || gFilterDateTo || gFilterRole || gFilterModel1 || gFilterModel2);
    }
    function updateFilterHint() {
      const el = document.getElementById("filterHint");
      if (el) el.classList.toggle("active", hasActiveFilters());
    }
    function getGlobalFilteredData() {
      let sessions = allSessions.slice();
      const hasSessionFilter = gFilterDateFrom || gFilterDateTo || gFilterRole;

      if (gFilterDateFrom) {
        const from = new Date(gFilterDateFrom + "T00:00:00").getTime();
        sessions = sessions.filter(s => s.createdAt >= from);
      }
      if (gFilterDateTo) {
        const to = new Date(gFilterDateTo + "T23:59:59.999").getTime();
        sessions = sessions.filter(s => s.createdAt <= to);
      }
      if (gFilterRole) {
        sessions = sessions.filter(s => s.roleName === gFilterRole);
      }

      const validSessionIds = new Set(sessions.map(s => s.id).filter(Boolean));

      let records = allRecords.filter(r => {
        if (!r.sessionId) return !hasSessionFilter;
        return validSessionIds.has(r.sessionId);
      });

      // Model filter
      if (gFilterModel1 && gFilterModel2) {
        records = records.filter(r => {
          const mA = r.apiA?.model;
          const mB = r.apiB?.model;
          return (mA === gFilterModel1 && mB === gFilterModel2) ||
                 (mA === gFilterModel2 && mB === gFilterModel1);
        });
      } else if (gFilterModel1) {
        records = records.filter(r => {
          return r.apiA?.model === gFilterModel1 || r.apiB?.model === gFilterModel1;
        });
      }

      // When model filter is active, also limit sessions to those with matching records
      if (gFilterModel1) {
        const sessionIdsWithRecords = new Set(records.map(r => r.sessionId).filter(Boolean));
        sessions = sessions.filter(s => sessionIdsWithRecords.has(s.id));
      }

      return { records, sessions };
    }
    function populateGlobalFilters() {
      const roleSelect = document.getElementById("globalRole");
      const model1Select = document.getElementById("globalModel1");
      const model2Select = document.getElementById("globalModel2");
      const curRole = roleSelect.value;
      const curM1 = model1Select.value;
      const curM2 = model2Select.value;

      const roles = getAllRoles();
      roleSelect.innerHTML = '<option value="">全部角色</option>' +
        roles.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("");
      if (roles.includes(curRole)) roleSelect.value = curRole;

      const models = getAllModels();
      const modelOpts = '<option value="">全部模型</option>' +
        models.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join("");
      model1Select.innerHTML = modelOpts;
      model2Select.innerHTML = modelOpts;
      if (models.includes(curM1)) model1Select.value = curM1;
      if (models.includes(curM2)) model2Select.value = curM2;
    }
    function applyGlobalFilters() {
      readGlobalFilters();
      updateFilterHint();
      renderStatsPanels();
      if (isAuthed) renderSessionsSection();
    }

    function esc(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function shortText(text, max = 80) {
      const s = String(text || "");
      return s.length > max ? s.slice(0, max - 1) + "…" : s;
    }
    function formatDate(ts) {
      if (!ts) return "—";
      return new Date(ts).toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false });
    }
    function toNum(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }
    function formatNum(value, digits = 2) {
      const n = toNum(value);
      return n == null ? "—" : n.toFixed(digits);
    }
    function formatPerfInline(data) {
      const parts = [];
      const latency = toNum(data?.latencyMs);
      const ttft = toNum(data?.ttftMs);
      const tps = toNum(data?.tps);
      if (latency != null) parts.push(`${Math.round(latency)}ms`);
      if (ttft != null) parts.push(`TTFT ${Math.round(ttft)}ms`);
      if (tps != null) parts.push(`TPS ${tps.toFixed(2)}`);
      return parts.join(" · ");
    }
    function isArchivedSession(session) {
      const archivedAt = toNum(session?.archivedAt);
      return archivedAt != null && archivedAt > 0;
    }
    function getArchiveFilterValue() {
      return document.getElementById("filterArchive")?.value || "active";
    }
    function matchesArchiveFilter(session, filterValue) {
      const archived = isArchivedSession(session);
      if (filterValue === "archived") return archived;
      if (filterValue === "all") return true;
      return !archived;
    }
    function getSessionById(sessionId) {
      return allSessions.find((session) => session.id === sessionId) || null;
    }
    function getSessionRecords(sessionId) {
      return allRecords
        .filter((record) => record.sessionId === sessionId)
        .sort((a, b) => a.turnOrder - b.turnOrder);
    }
    function getStatsRecords() {
      const { records, sessions } = getGlobalFilteredData();
      const archivedSessionIds = new Set(
        sessions.filter(isArchivedSession).map((session) => session.id).filter(Boolean)
      );
      if (!archivedSessionIds.size) return records;
      return records.filter((record) => !record.sessionId || !archivedSessionIds.has(record.sessionId));
    }
    async function requestJson(url, options) {
      const res = await fetch(url, options);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || data.detail || `请求失败（${res.status}）`);
      }
      return data;
    }

    // ── 统计：对战矩阵 + Bradley-Terry 排名 ──────────────
    function buildMatchStats(records) {
      // wins[i][j] = model i 在对阵 model j 时赢的次数
      // games[i][j] = model i 对阵 model j 的总场次
      const wins = {};   // wins[modelA][modelB]
      const games = {};  // games[modelA][modelB]
      let voteCount = 0, discardCount = 0;
      const sessions = new Set();
      const modelSet = new Set();
      let perfSamples = 0;
      let ttftSamples = 0;
      let tpsSamples = 0;
      let ttftSum = 0;
      let tpsSum = 0;
      const perfByModel = new Map();

      function ensurePerfModel(model) {
        if (!perfByModel.has(model)) {
          perfByModel.set(model, {
            model,
            samples: 0,
            ttftSamples: 0,
            tpsSamples: 0,
            ttftSum: 0,
            tpsSum: 0,
          });
        }
        return perfByModel.get(model);
      }

      function ensure(a, b) {
        if (!wins[a]) wins[a] = {};
        if (!wins[b]) wins[b] = {};
        if (!games[a]) games[a] = {};
        if (!games[b]) games[b] = {};
        if (wins[a][b] == null) wins[a][b] = 0;
        if (wins[b][a] == null) wins[b][a] = 0;
        if (games[a][b] == null) games[a][b] = 0;
        if (games[b][a] == null) games[b][a] = 0;
      }

      for (const r of records) {
        if (r.sessionId) sessions.add(r.sessionId);

        const perfResponses = [r.apiA, r.apiB];
        for (const api of perfResponses) {
          if (!api || !api.ok) continue;
          const model = api.model || "unknown";
          const row = ensurePerfModel(model);
          row.samples += 1;
          perfSamples += 1;

          const ttft = toNum(api.ttftMs);
          if (ttft != null && ttft >= 0) {
            row.ttftSamples += 1;
            row.ttftSum += ttft;
            ttftSamples += 1;
            ttftSum += ttft;
          }
          const tps = toNum(api.tps);
          if (tps != null && tps >= 0) {
            row.tpsSamples += 1;
            row.tpsSum += tps;
            tpsSamples += 1;
            tpsSum += tps;
          }
        }

        if (r.action === "discard") { discardCount++; continue; }
        if (r.action !== "vote") continue;
        voteCount++;

        const mA = r.apiA?.model;
        const mB = r.apiB?.model;
        if (!mA || !mB) continue;

        // 相同模型不计入矩阵
        if (mA === mB) continue;

        modelSet.add(mA);
        modelSet.add(mB);
        ensure(mA, mB);

        games[mA][mB] += 1;
        games[mB][mA] += 1;

        const winner = r.selectedModel ||
          (r.selected === "a" ? mA : r.selected === "b" ? mB : null);
        if (winner === mA) wins[mA][mB] += 1;
        else if (winner === mB) wins[mB][mA] += 1;
      }

      const models = [...modelSet].sort();
      const perfRows = [...perfByModel.values()]
        .map((row) => ({
          model: row.model,
          samples: row.samples,
          avgTtftMs: row.ttftSamples ? row.ttftSum / row.ttftSamples : null,
          avgTps: row.tpsSamples ? row.tpsSum / row.tpsSamples : null,
        }))
        .sort((a, b) => {
          if (b.samples !== a.samples) return b.samples - a.samples;
          const tpsA = toNum(a.avgTps) ?? -1;
          const tpsB = toNum(b.avgTps) ?? -1;
          return tpsB - tpsA;
        });

      return {
        wins,
        games,
        models,
        voteCount,
        discardCount,
        sessions: sessions.size,
        total: records.length,
        perfSamples,
        avgTtftMs: ttftSamples ? ttftSum / ttftSamples : null,
        avgTps: tpsSamples ? tpsSum / tpsSamples : null,
        perfRows,
      };
    }

    // Bradley-Terry 迭代求解
    function bradleyTerry(models, wins, games, maxIter = 200, tol = 1e-6) {
      if (!models.length) return {};
      const score = {};
      for (const m of models) score[m] = 1.0;

      for (let iter = 0; iter < maxIter; iter++) {
        const newScore = {};
        let maxDelta = 0;
        for (const i of models) {
          let num = 0, den = 0;
          for (const j of models) {
            if (i === j) continue;
            const g = (games[i]?.[j] || 0);
            if (!g) continue;
            num += (wins[i]?.[j] || 0);
            den += g / (score[i] + score[j]);
          }
          newScore[i] = den > 0 ? num / den : score[i];
        }
        // Normalize so sum = models.length
        const total = Object.values(newScore).reduce((s, v) => s + v, 0);
        for (const m of models) {
          newScore[m] = total > 0 ? newScore[m] / total * models.length : 1;
          maxDelta = Math.max(maxDelta, Math.abs(newScore[m] - score[m]));
          score[m] = newScore[m];
        }
        if (maxDelta < tol) break;
      }
      return score;
    }

    function renderRanking(stats) {
      const el = document.getElementById("rankingBody");
      if (!stats.models.length) {
        el.innerHTML = `<p class="empty-state" style="padding:8px 0">暂无跨模型对战数据</p>`;
        return;
      }
      const scores = bradleyTerry(stats.models, stats.wins, stats.games);
      const ranked = [...stats.models].sort((a, b) => scores[b] - scores[a]);
      const maxScore = Math.max(...Object.values(scores), 1);
      const medals = ["gold", "silver", "bronze"];

      el.innerHTML = ranked.map((m, i) => {
        const s = scores[m];
        const totalWins = stats.models.reduce((acc, j) => acc + (j !== m ? (stats.wins[m]?.[j] || 0) : 0), 0);
        const totalGames = stats.models.reduce((acc, j) => acc + (j !== m ? (stats.games[m]?.[j] || 0) : 0), 0);
        const wr = totalGames ? Math.round(totalWins / totalGames * 100) : 0;
        return `
          <div class="rank-row">
            <div class="rank-num ${medals[i] || ""}">${i + 1}</div>
            <div class="rank-model" title="${esc(m)}">${esc(m)}</div>
            <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${Math.round(s / maxScore * 100)}%"></div></div>
            <div class="rank-score">${totalWins}胜/${totalGames}场 · ${wr}%</div>
          </div>`;
      }).join("");
    }

    function renderMatrix(stats) {
      const el = document.getElementById("matrixBody");
      if (!stats.models.length) {
        el.innerHTML = `<p class="empty-state">暂无跨模型对战数据</p>`;
        return;
      }
      const { models, wins, games } = stats;
      const scores = bradleyTerry(models, wins, games);
      const ranked = [...models].sort((a, b) => scores[b] - scores[a]);

      let html = `<table class="matrix-table"><thead><tr><th class="row-header">行 \\ 列</th>`;
      for (const col of ranked) html += `<th title="${esc(col)}">${esc(shortText(col, 20))}</th>`;
      html += `</tr></thead><tbody>`;

      for (const row of ranked) {
        html += `<tr><th class="row-header" title="${esc(row)}">${esc(shortText(row, 24))}</th>`;
        for (const col of ranked) {
          if (row === col) {
            html += `<td class="diag">—</td>`;
          } else {
            const w = wins[row]?.[col] || 0;
            const g = games[row]?.[col] || 0;
            if (!g) {
              html += `<td class="matrix-cell-even" style="color:#cbd5e1">—</td>`;
            } else {
              const pct = Math.round(w / g * 100);
              const cls = pct > 50 ? "matrix-cell-win" : pct < 50 ? "matrix-cell-lose" : "matrix-cell-even";
              html += `<td class="${cls}">${w}/${g}<br><span style="font-size:.7rem">${pct}%</span></td>`;
            }
          }
        }
        html += `</tr>`;
      }
      html += `</tbody></table>`;
      el.innerHTML = html;
    }

    function renderKpi(stats) {
      document.getElementById("kpiTotal").textContent = stats.voteCount + stats.discardCount;
      document.getElementById("kpiVotes").textContent = stats.voteCount;
      document.getElementById("kpiSkip").textContent = stats.discardCount;
      document.getElementById("kpiSessions").textContent = stats.sessions;
      document.getElementById("kpiAvgTtft").textContent =
        stats.avgTtftMs != null ? String(Math.round(stats.avgTtftMs)) : "—";
      document.getElementById("kpiAvgTps").textContent =
        stats.avgTps != null ? stats.avgTps.toFixed(2) : "—";
    }

    function renderPerfTable(stats) {
      const el = document.getElementById("perfTableBody");
      const rows = Array.isArray(stats.perfRows) ? stats.perfRows : [];
      if (!rows.length) {
        el.innerHTML = `<p class="empty-state" style="padding:12px 0">暂无速度数据</p>`;
        return;
      }
      let html = `<table class="perf-table"><thead><tr>
        <th>模型</th>
        <th style="text-align:right">样本</th>
        <th style="text-align:right">平均 TTFT (ms)</th>
        <th style="text-align:right">平均 TPS</th>
      </tr></thead><tbody>`;
      for (const row of rows) {
        html += `<tr>
          <td title="${esc(row.model)}">${esc(shortText(row.model, 48))}</td>
          <td class="num">${row.samples}</td>
          <td class="num">${formatNum(row.avgTtftMs, 0)}</td>
          <td class="num">${formatNum(row.avgTps, 2)}</td>
        </tr>`;
      }
      html += `</tbody></table>`;
      el.innerHTML = html;
    }

    function renderStatsPanels() {
      const stats = buildMatchStats(getStatsRecords());
      renderKpi(stats);
      renderRanking(stats);
      renderMatrix(stats);
      renderPerfTable(stats);
    }

    // ── 对话列表 ──────────────────────────────────────────
    function buildSessionSummaries() {
      const { records: filteredRecords, sessions: filteredSessions } = getGlobalFilteredData();
      const bySession = new Map();
      for (const record of filteredRecords) {
        if (!record.sessionId) continue;
        if (!bySession.has(record.sessionId)) bySession.set(record.sessionId, []);
        bySession.get(record.sessionId).push(record);
      }

      return filteredSessions.map((session) => {
        const recs = (bySession.get(session.id) || []).sort((a, b) => a.turnOrder - b.turnOrder);
        const firstUser = recs[0]?.userText || "";
        const voteRecs = recs.filter((record) => record.action === "vote");
        const models = [...new Set([
          ...recs.map((record) => record.apiA?.model).filter(Boolean),
          ...recs.map((record) => record.apiB?.model).filter(Boolean),
        ])];
        return { session, recs, firstUser, voteRecs, models };
      }).filter((item) => item.recs.length > 0 || item.session.turnCount > 0);
    }

    function renderSessionsHint(summaries, filtered) {
      const el = document.getElementById("sessionsHint");
      const archivedCount = summaries.filter((item) => isArchivedSession(item.session)).length;
      const activeCount = summaries.length - archivedCount;
      el.textContent = `当前显示 ${filtered.length} 条对话；未归档 ${activeCount} 条，已归档 ${archivedCount} 条。上方统计仅统计未归档数据。`;
    }

    function renderSessionsList(summaries) {
      const el = document.getElementById("sessionsList");
      if (!summaries.length) {
        el.innerHTML = `<p class="empty-state">暂无对话记录</p>`;
        return;
      }

      el.innerHTML = "";
      for (const { session, recs, firstUser, voteRecs, models } of summaries) {
        const row = document.createElement("div");
        row.className = "session-row";
        const winnerCounts = {};
        for (const record of voteRecs) {
          const winner = record.selectedModel || (record.selected === "a" ? record.apiA?.model : record.apiB?.model) || "";
          if (winner) winnerCounts[winner] = (winnerCounts[winner] || 0) + 1;
        }
        const winnerBadges = Object.entries(winnerCounts)
          .sort((a, b) => b[1] - a[1])
          .map(([model, count]) => `<span class="badge badge-model">${esc(model)} ×${count}</span>`)
          .join(" ");
        const archived = isArchivedSession(session);

        row.innerHTML = `
          <div class="session-row-main">
            <div class="session-row-title">${esc(session.roleName || "未知角色")}</div>
            <div class="session-row-meta">
              <span>${formatDate(session.createdAt)}</span>
              <span>${recs.length} 轮</span>
              <span>${models.map((model) => esc(model)).join(" vs ") || "模型信息缺失"}</span>
            </div>
            <div class="session-row-preview">${esc(shortText(firstUser, 100))}</div>
          </div>
          <div class="session-row-right">
            <div class="session-row-badges">
              ${archived ? `<span class="badge badge-archived">已归档</span>` : ""}
              ${winnerBadges || `<span class="badge badge-skip">无评测</span>`}
            </div>
            <button type="button" class="row-action-btn${archived ? " secondary" : ""}" data-action="toggle-archive">
              ${archived ? "取消归档" : "归档"}
            </button>
          </div>
        `;

        row.addEventListener("click", () => openDialog(session, recs));
        row.querySelector('[data-action="toggle-archive"]').addEventListener("click", async (event) => {
          event.stopPropagation();
          await toggleArchiveSession(session.id);
        });
        el.appendChild(row);
      }
    }

    function renderSessionsSection() {
      const summaries = buildSessionSummaries();
      const status = getArchiveFilterValue();
      const filtered = summaries
        .filter((item) => matchesArchiveFilter(item.session, status));

      renderSessionsHint(summaries, filtered);
      renderSessionsList(filtered);
    }

    function applyFilters() {
      if (!isAuthed) return;
      renderSessionsSection();
    }

    function showSessionsPanel() {
      document.getElementById("authWall").style.display = "none";
      document.getElementById("sessionsHint").style.display = "";
      document.getElementById("sessionsList").style.display = "";
    }

    function renderDialogArchiveButton(session) {
      const btn = document.getElementById("dialogArchiveBtn");
      if (!isAuthed || !session) {
        btn.classList.add("hidden");
        btn.disabled = true;
        btn.textContent = "归档";
        return;
      }

      btn.classList.remove("hidden");
      btn.disabled = isArchiveSaving;
      if (isArchiveSaving && currentDialogSessionId === session.id) {
        btn.textContent = "处理中...";
        return;
      }
      btn.textContent = isArchivedSession(session) ? "取消归档" : "归档";
    }

    async function toggleArchiveSession(sessionId) {
      if (!isAuthed || isArchiveSaving) return;
      const session = getSessionById(sessionId);
      if (!session) {
        alert("找不到对应的对话记录");
        return;
      }

      const archived = isArchivedSession(session);
      const confirmed = window.confirm(
        archived
          ? "确认取消归档这条对话？取消后，上方统计会重新纳入它。"
          : "确认归档这条对话？归档后，上方统计会排除这条对话。"
      );
      if (!confirmed) return;

      isArchiveSaving = true;
      renderDialogArchiveButton(currentDialogSessionId ? getSessionById(currentDialogSessionId) : null);

      try {
        const data = await requestJson(SESSIONS_API, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: sessionId,
            patch: { archivedAt: archived ? null : Date.now() },
          }),
        });

        const updatedSession = data.session;
        const idx = allSessions.findIndex((item) => item.id === sessionId);
        if (idx >= 0) allSessions[idx] = updatedSession;
        allSessions.sort((a, b) => b.createdAt - a.createdAt);

        renderStatsPanels();
        if (isAuthed) renderSessionsSection();

        if (currentDialogSessionId === sessionId && !document.getElementById("dialogOverlay").classList.contains("hidden")) {
          openDialog(updatedSession, getSessionRecords(sessionId));
        }
      } catch (error) {
        alert(`归档失败：${error.message}`);
      } finally {
        isArchiveSaving = false;
        renderDialogArchiveButton(currentDialogSessionId ? getSessionById(currentDialogSessionId) : null);
      }
    }

    // ── 对话详情弹窗 ──────────────────────────────────────
    function openDialog(session, recs) {
      currentDialogSessionId = session.id || "";
      document.getElementById("dialogTitle").textContent =
        `${session.roleName || "未知角色"} · ${formatDate(session.createdAt)}`;
      const models = [...new Set([
        ...recs.map((record) => record.apiA?.model).filter(Boolean),
        ...recs.map((record) => record.apiB?.model).filter(Boolean),
      ])];
      const metaParts = [];
      if (models.length) metaParts.push(models.join(" vs "));
      metaParts.push(`Temperature ${session.temperature ?? 0}`);
      metaParts.push(`共 ${recs.length} 轮`);
      if (isArchivedSession(session)) {
        metaParts.push(`已归档于 ${formatDate(session.archivedAt)}`);
      }
      document.getElementById("dialogMeta").textContent = metaParts.join("  ·  ");
      renderDialogArchiveButton(session);

      const body = document.getElementById("dialogBody");
      body.innerHTML = "";

      for (const rec of recs.sort((a, b) => a.turnOrder - b.turnOrder)) {
        const userEl = document.createElement("article");
        userEl.className = "msg user";
        userEl.innerHTML = `<div class="msg-meta"><span>用户</span></div><div class="msg-bubble">${esc(rec.userText)}</div>`;
        body.appendChild(userEl);

        const block = document.createElement("div");
        block.className = "turn-block";

        const selectedModel = rec.selectedModel ||
          (rec.selected === "a" ? rec.apiA?.model : rec.selected === "b" ? rec.apiB?.model : null);

        const responses = [
          { data: rec.apiA, slot: "a" },
          { data: rec.apiB, slot: "b" },
        ];

        const grid = document.createElement("div");
        grid.className = "turn-compare-grid";

        for (const { data, slot } of responses) {
          if (!data) continue;
          const isChosen = rec.action === "vote" && rec.selected === slot;
          const div = document.createElement("div");
          div.className = `turn-response${isChosen ? " chosen" : ""}${!data.ok ? " errored" : ""}`;
          div.innerHTML = `
            <div class="turn-response-head">
              <span class="turn-model-name" title="${esc(data.model)}">${esc(data.model || "—")}</span>
              <span class="turn-latency">${esc(formatPerfInline(data))}</span>
              ${isChosen ? `<span class="chosen-badge">✓ 已选</span>` : ""}
            </div>
            <div class="turn-response-body">${esc(data.content || "（无内容）")}</div>
          `;
          grid.appendChild(div);
        }
        block.appendChild(grid);

        if (rec.action === "discard") {
          const note = document.createElement("p");
          note.className = "turn-skip-note";
          note.textContent = "⚠ 本轮已跳过";
          block.appendChild(note);
        }
        body.appendChild(block);

        if (rec.action === "vote" && rec.selected) {
          const chosen = rec.selected === "a" ? rec.apiA : rec.apiB;
          const assistantEl = document.createElement("article");
          assistantEl.className = "msg assistant";
          assistantEl.innerHTML = `
            <div class="msg-meta">
              <span>助手</span>
              <span class="msg-source-badge badge-${rec.selected}">${esc(selectedModel || rec.selected.toUpperCase())}</span>
            </div>
            <div class="msg-bubble">${esc(chosen?.content || "")}</div>
          `;
          body.appendChild(assistantEl);
        }
      }

      document.getElementById("dialogOverlay").classList.remove("hidden");
    }

    const ADMIN_AUTH_API = "/api/admin-auth";
    let isAuthed = sessionStorage.getItem("zmd-admin-authed") === "1";

    async function tryLogin() {
      const pw = document.getElementById("adminPasswordInput").value;
      const errEl = document.getElementById("authError");
      errEl.textContent = "";
      if (!pw) { errEl.textContent = "请输入密码"; return; }
      try {
        const res = await fetch(ADMIN_AUTH_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw }),
        });
        if (res.ok) {
          sessionStorage.setItem("zmd-admin-authed", "1");
          isAuthed = true;
          showSessionsPanel();
          await loadSessions();
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.error || "密码错误";
        }
      } catch (e) {
        errEl.textContent = "请求失败：" + e.message;
      }
    }

    // ── 加载 ──────────────────────────────────────────────
    async function loadSessions() {
      try {
        renderSessionsSection();
      } catch (e) {
        document.getElementById("sessionsHint").style.display = "none";
        document.getElementById("sessionsList").innerHTML =
          `<p class="empty-state" style="color:var(--err)">加载失败：${e.message}</p>`;
      }
    }

    async function load() {
      document.getElementById("lastUpdated").textContent = "加载中...";
      try {
        const [recData, sesData] = await Promise.all([
          requestJson(`${RECORDS_API}?limit=2000`),
          requestJson(`${SESSIONS_API}?limit=1000`),
        ]);
        allRecords = Array.isArray(recData.items) ? recData.items : [];
        allSessions = Array.isArray(sesData.sessions) ? sesData.sessions : [];
        allSessions.sort((a, b) => b.createdAt - a.createdAt);

        populateGlobalFilters();
        readGlobalFilters();
        updateFilterHint();
        renderStatsPanels();

        document.getElementById("lastUpdated").textContent =
          `更新于 ${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;

        if (isAuthed) {
          showSessionsPanel();
          await loadSessions();
        }
      } catch (e) {
        document.getElementById("lastUpdated").textContent = "加载失败";
        document.getElementById("sessionsHint").style.display = "none";
        document.getElementById("sessionsList").innerHTML =
          `<p class="empty-state" style="color:var(--err)">加载失败：${e.message}</p>`;
      }
    }

    async function exportRecords() {
      try {
        readGlobalFilters();
        const { records } = getGlobalFilteredData();
        const filters = { dateFrom: gFilterDateFrom, dateTo: gFilterDateTo, role: gFilterRole, model1: gFilterModel1, model2: gFilterModel2 };
        const hasFilters = Object.values(filters).some(Boolean);
        const payload = { items: records, exportedAt: Date.now() };
        if (hasFilters) payload.filters = filters;
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `zhumengdao-records-${Date.now()}.json`; a.click();
        URL.revokeObjectURL(url);
      } catch (e) { alert("导出失败：" + e.message); }
    }

    document.getElementById("refreshBtn").addEventListener("click", load);
    document.getElementById("exportBtn").addEventListener("click", exportRecords);
    document.getElementById("filterArchive").addEventListener("change", applyFilters);
    document.getElementById("globalDateFrom").addEventListener("change", applyGlobalFilters);
    document.getElementById("globalDateTo").addEventListener("change", applyGlobalFilters);
    document.getElementById("globalRole").addEventListener("change", applyGlobalFilters);
    document.getElementById("globalModel1").addEventListener("change", applyGlobalFilters);
    document.getElementById("globalModel2").addEventListener("change", applyGlobalFilters);
    document.getElementById("clearFiltersBtn").addEventListener("click", () => {
      document.getElementById("globalDateFrom").value = "";
      document.getElementById("globalDateTo").value = "";
      document.getElementById("globalRole").value = "";
      document.getElementById("globalModel1").value = "";
      document.getElementById("globalModel2").value = "";
      applyGlobalFilters();
    });
    document.getElementById("adminLoginBtn").addEventListener("click", tryLogin);
    document.getElementById("adminPasswordInput").addEventListener("keydown", e => {
      if (e.key === "Enter") tryLogin();
    });
    document.getElementById("dialogArchiveBtn").addEventListener("click", async () => {
      if (currentDialogSessionId) await toggleArchiveSession(currentDialogSessionId);
    });
    document.getElementById("dialogClose").addEventListener("click", () => {
      currentDialogSessionId = "";
      document.getElementById("dialogOverlay").classList.add("hidden");
    });
    document.getElementById("dialogOverlay").addEventListener("click", e => {
      if (e.target === document.getElementById("dialogOverlay")) {
        currentDialogSessionId = "";
        document.getElementById("dialogOverlay").classList.add("hidden");
      }
    });
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        currentDialogSessionId = "";
        document.getElementById("dialogOverlay").classList.add("hidden");
      }
    });

    load();
  </script>
</body>
</html>
