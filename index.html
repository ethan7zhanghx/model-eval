<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型评测平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="page-shell">

    <header class="app-header">
      <div class="brand">
        <span class="brand-icon">🧪</span>
        <h1>模型评测平台<span class="brand-sub">Model Eval</span></h1>
      </div>
      <div class="header-actions">
        <a href="./zhumengdao/" class="ghost-btn" style="text-decoration:none">⛵ 筑梦岛</a>
        <a href="./dashboard.html" class="ghost-btn" style="text-decoration:none">📊 数据看板</a>
        <button id="saveConfigBtn" class="ghost-btn">保存配置</button>
        <button id="runWorkflowBtn" class="primary">▶ 执行</button>
      </div>
    </header>

    <section class="panel config-panel">
      <div class="panel-head">
        <h2><span class="panel-icon">⚙️</span>全局配置</h2>
        <p id="statusBar" class="status" style="margin:0"></p>
      </div>
      <div class="form-grid">
        <label>
          <span id="apiKeyLabel">OpenRouter API Key</span>
          <input id="apiKeyInput" type="password" placeholder="sk-or-v1-..." autocomplete="off">
        </label>

        <label>
          <span>接口来源</span>
          <select id="providerSelect">
            <option value="openrouter">OpenRouter（官方模型列表）</option>
            <option value="custom">自定义接口（手动输入模型）</option>
          </select>
        </label>

        <label>
          <span>Temperature</span>
          <input id="temperatureInput" type="number" value="0" min="0" max="2" step="0.1">
        </label>

        <label id="baseUrlRow" class="full-span hidden">
          <span>Base URL（chat completions 接口）</span>
          <input id="baseUrlInput" type="text" placeholder="https://api.openai.com/v1/chat/completions" autocomplete="off">
        </label>

        <label class="checkbox-row">
          <input id="rememberKeyInput" type="checkbox">
          <span>记住 API Key（浏览器本地缓存）</span>
        </label>

        <label class="full-span">
          <span>System Prompt</span>
          <textarea id="systemPromptInput" rows="3"></textarea>
        </label>
      </div>
      <div class="cost-estimate-row">
        <label class="cost-estimate-input">
          <span>输出 Token 估算系数</span>
          <input id="outputTokenRatioInput" type="number" value="1.0" min="0.1" max="4" step="0.1">
        </label>
        <p id="costSummary" class="status">预估总花费：等待输入 Prompt 与模型</p>
      </div>
    </section>

    <section class="panel model-panel">
      <div class="panel-head">
        <h2><span class="panel-icon">🤖</span>模型列配置</h2>
        <div class="actions-inline">
          <button id="refreshModelsBtn" class="ghost-btn">刷新模型列表</button>
          <button id="addModelColBtn" class="primary">+ 添加模型列</button>
        </div>
      </div>
      <p id="modelMeta" class="hint">正在加载官方模型列表...</p>
      <div id="modelColumns" class="model-columns"></div>
    </section>

    <section class="panel history-panel">
      <div class="panel-head">
        <h2><span class="panel-icon">🕘</span>配置历史</h2>
        <div class="actions-inline">
          <button id="clearHistoryBtn" class="ghost-btn">清空历史</button>
        </div>
      </div>
      <p class="hint">保存模型列、System Prompt、Temperature、环节 Prompt。</p>
      <div id="historyList" class="history-list"></div>
    </section>

    <section class="panel judge-panel" id="judgeSection">
      <div class="panel-head">
        <h2><span class="panel-icon">🏅</span>评分配置</h2>
        <div class="actions-inline">
          <button id="runJudgeBtn" class="primary">运行 Judge 评分</button>
        </div>
      </div>
      <div class="score-method-row">
        <label>
          <span>评分方式</span>
          <select id="globalScoreMethod">
            <option value="none">不评分</option>
            <option value="exact">精确匹配（需参考答案）</option>
            <option value="judge">LLM Judge</option>
          </select>
        </label>
        <p class="hint" style="margin:0">精确匹配：参考答案在每行 Prompt 列下方填写，或通过数据集导入自动填入。</p>
      </div>
      <div id="judgeConfig" class="hidden">
        <div class="form-grid judge-form-grid">
          <label>
            <span>Judge 模型 ID</span>
            <input id="judgeModelInput" type="text" placeholder="例如 openai/gpt-4o-mini" autocomplete="off">
          </label>
          <label class="full-span">
            <span>Judge Prompt 模板 <small>（变量：{{prompt}} {{response}} {{reference}}）</small></span>
            <textarea id="judgePromptInput" rows="6"></textarea>
          </label>
        </div>
      </div>
      <div id="scoreSummary" class="score-summary"></div>
    </section>

    <section class="panel table-panel">
      <div class="panel-head">
        <h2><span class="panel-icon">📋</span>测试用例</h2>
        <div class="actions-inline">
          <button id="importDatasetBtn" class="primary">导入数据集</button>
          <button id="importPromptBtn" class="ghost-btn">导入 md/txt</button>
          <button id="addRowBtn" class="ghost-btn">+ 新增</button>
          <button id="clearRowsBtn" class="ghost-btn">清空</button>
        </div>
      </div>
      <div class="actions">
        <button id="clearResultsBtn" class="ghost-btn">清空结果</button>
        <button id="exportBtn" class="ghost-btn">导出 JSON</button>
      </div>
      <input id="promptFileInput" type="file" accept=".md,.txt,text/markdown,text/plain" hidden>
      <input id="datasetFileInput" type="file" accept=".csv,.json,.xlsx" hidden>
      <p class="hint">数据集模式：导入 CSV / JSON / XLSX，选择 Q/A 列后批量跑。多轮对话模式：手动填写或导入 md/txt。</p>

      <div class="table-wrap">
        <table id="caseTable">
          <thead id="caseTableHead"></thead>
          <tbody id="caseTableBody"></tbody>
        </table>
      </div>
    </section>
  </div><!-- /.page-shell -->

  <!-- Column mapping modal -->
  <div id="columnMapModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>列映射配置</h2>
      <div id="columnMapForm" class="column-map-form"></div>
      <div class="actions-inline" style="margin-top:14px">
        <button id="columnMapConfirm" class="primary">确认导入</button>
        <button id="columnMapCancel">取消</button>
      </div>
    </div>
  </div>

  <template id="modelColumnTemplate">
    <article class="model-column-card">
      <div class="model-column-head">
        <strong class="model-column-title"></strong>
        <button class="small-btn remove-col-btn" type="button">移除</button>
      </div>
      <select class="model-select"></select>
      <p class="model-pricing"></p>
    </article>
  </template>

  <template id="historyItemTemplate">
    <article class="history-item">
      <div class="history-main">
        <strong class="history-title"></strong>
        <p class="history-meta"></p>
      </div>
      <div class="actions-inline">
        <button type="button" class="small-btn load-history-btn">载入</button>
        <button type="button" class="small-btn delete-history-btn">删除</button>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
